<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Repayment Estimator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
        }

        .input-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1.1em;
            transition: border 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-calculate {
            background: #667eea;
            color: white;
        }

        .btn-calculate:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-save {
            background: #28a745;
            color: white;
        }

        .btn-save:hover {
            background: #218838;
        }

        .btn-view {
            background: #17a2b8;
            color: white;
        }

        .btn-view:hover {
            background: #138496;
        }

        .results-section {
            display: none;
            margin-top: 30px;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .card-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .card-value {
            font-size: 2em;
            font-weight: bold;
        }

        .table-container {
            overflow-x: auto;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-top: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f1f3f5;
        }

        .saved-scenarios {
            display: none;
            margin-top: 30px;
        }

        .scenario-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 5px solid #667eea;
        }

        .scenario-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .scenario-name {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
        }

        .scenario-date {
            color: #666;
            font-size: 0.9em;
        }

        .scenario-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .detail-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }

        .detail-label {
            font-size: 0.85em;
            color: #666;
        }

        .detail-value {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Loan Repayment Estimator</h1>
        <p class="subtitle">Calculate your loan EMI and view detailed amortization schedule</p>

        <div class="input-section">
            <div class="input-group">
                <label for="principal">Loan Amount (₹)</label>
                <input type="number" id="principal" placeholder="e.g., 100000" min="1000">
            </div>

            <div class="input-group">
                <label for="rate">Annual Interest Rate (%)</label>
                <input type="number" id="rate" placeholder="e.g., 12" min="1" max="30" step="0.1">
            </div>

            <div class="input-group">
                <label for="tenure">Loan Tenure (Years)</label>
                <input type="number" id="tenure" placeholder="e.g., 2" min="1" max="30">
            </div>

            <div class="button-group">
                <button class="btn-calculate" onclick="calculateLoan()">Calculate EMI</button>
                <button class="btn-save" onclick="saveScenario()" id="saveBtn" disabled>Save Scenario</button>
                <button class="btn-view" onclick="toggleSavedScenarios()">View Saved</button>
            </div>
        </div>

        <div class="results-section" id="results">
            <h2 style="color: #667eea; margin-bottom: 20px;">📊 Loan Summary</h2>
            <div class="summary-cards">
                <div class="card">
                    <div class="card-label">Monthly EMI</div>
                    <div class="card-value" id="emiValue">₹0</div>
                </div>
                <div class="card">
                    <div class="card-label">Total Interest</div>
                    <div class="card-value" id="interestValue">₹0</div>
                </div>
                <div class="card">
                    <div class="card-label">Total Payment</div>
                    <div class="card-value" id="totalValue">₹0</div>
                </div>
            </div>

            <div class="table-container">
                <h3 style="margin-bottom: 15px; color: #333;">📅 Amortization Schedule</h3>
                <table id="scheduleTable">
                    <thead>
                        <tr>
                            <th>Month</th>
                            <th>EMI Paid</th>
                            <th>Interest</th>
                            <th>Principal</th>
                            <th>Balance</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleBody">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="saved-scenarios" id="savedScenarios">
            <h2 style="color: #667eea; margin-bottom: 20px;">📂 Saved Loan Scenarios</h2>
            <div id="scenariosList"></div>
        </div>
    </div>

    <script>
        let currentLoanData = null;

        function calculateLoan() {
            // Get inputs
            const principal = parseFloat(document.getElementById('principal').value);
            const annualRate = parseFloat(document.getElementById('rate').value);
            const years = parseFloat(document.getElementById('tenure').value);

            // Validation
            if (!principal || !annualRate || !years) {
                alert('Please fill all fields!');
                return;
            }

            // Calculate EMI
            const months = years * 12;
            const monthlyRate = annualRate / 12 / 100;
            const emi = (principal * monthlyRate * Math.pow(1 + monthlyRate, months)) / 
                        (Math.pow(1 + monthlyRate, months) - 1);

            // Calculate totals
            const totalPaid = emi * months;
            const totalInterest = totalPaid - principal;

            // Store current data
            currentLoanData = {
                principal: principal,
                annualRate: annualRate,
                years: years,
                months: months,
                emi: emi,
                totalInterest: totalInterest,
                totalPaid: totalPaid
            };

            // Display summary
            document.getElementById('emiValue').textContent = `₹${emi.toFixed(2)}`;
            document.getElementById('interestValue').textContent = `₹${totalInterest.toFixed(2)}`;
            document.getElementById('totalValue').textContent = `₹${totalPaid.toFixed(2)}`;

            // Generate amortization schedule
            generateSchedule(principal, monthlyRate, emi, months);

            // Show results
            document.getElementById('results').style.display = 'block';
            document.getElementById('saveBtn').disabled = false;

            // Scroll to results
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }

        function generateSchedule(principal, monthlyRate, emi, months) {
            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = '';

            let balance = principal;

            for (let month = 1; month <= months; month++) {
                const interest = balance * monthlyRate;
                const principalPaid = emi - interest;
                balance -= principalPaid;

                // Avoid negative balance due to rounding
                if (balance < 0) balance = 0;

                const row = `
                    <tr>
                        <td>${month}</td>
                        <td>₹${emi.toFixed(2)}</td>
                        <td>₹${interest.toFixed(2)}</td>
                        <td>₹${principalPaid.toFixed(2)}</td>
                        <td>₹${balance.toFixed(2)}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            }
        }

        function saveScenario() {
            if (!currentLoanData) {
                alert('Please calculate a loan first!');
                return;
            }

            const name = prompt('Enter a name for this scenario:');
            if (!name) return;

            const scenario = {
                name: name,
                date: new Date().toLocaleString(),
                ...currentLoanData
            };

            // Get existing scenarios
            let scenarios = JSON.parse(localStorage.getItem('loanScenarios') || '[]');
            scenarios.push(scenario);
            localStorage.setItem('loanScenarios', JSON.stringify(scenarios));

            alert(`✅ Scenario "${name}" saved successfully!`);
        }

        function toggleSavedScenarios() {
            const section = document.getElementById('savedScenarios');
            const isHidden = section.style.display === 'none' || section.style.display === '';
            
            if (isHidden) {
                loadSavedScenarios();
                section.style.display = 'block';
                section.scrollIntoView({ behavior: 'smooth' });
            } else {
                section.style.display = 'none';
            }
        }

        function loadSavedScenarios() {
            const scenarios = JSON.parse(localStorage.getItem('loanScenarios') || '[]');
            const container = document.getElementById('scenariosList');

            if (scenarios.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #666;">No saved scenarios yet.</p>';
                return;
            }

            container.innerHTML = scenarios.map((scenario, index) => `
                <div class="scenario-card">
                    <div class="scenario-header">
                        <div class="scenario-name">${scenario.name}</div>
                        <div class="scenario-date">${scenario.date}</div>
                    </div>
                    <div class="scenario-details">
                        <div class="detail-item">
                            <div class="detail-label">Loan Amount</div>
                            <div class="detail-value">₹${scenario.principal.toLocaleString()}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Interest Rate</div>
                            <div class="detail-value">${scenario.annualRate}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Tenure</div>
                            <div class="detail-value">${scenario.years} years</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Monthly EMI</div>
                            <div class="detail-value">₹${scenario.emi.toFixed(2)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Total Interest</div>
                            <div class="detail-value">₹${scenario.totalInterest.toFixed(2)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Total Payment</div>
                            <div class="detail-value">₹${scenario.totalPaid.toFixed(2)}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
